      </div>
    </div>
  );
};

// ── CL Modal ───────────────────────────────────────────────────────────────
const CLModal = ({ result, onClose }) => {
  if (!result) return null;
  return (
    <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-3" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl slide-up" onClick={e=>e.stopPropagation()}>
        <div className={`p-5 rounded-t-2xl flex items-center justify-between ${result.type==='uptodate' ? 'bg-blue-600' : 'bg-amber-500'}`}>
          <div className="flex items-center gap-3">
            <Trophy className="w-6 h-6 text-white"/>
            <span className="text-white font-bold">Champions League Update</span>
          </div>
          <button onClick={onClose}><Close className="w-5 h-5 text-white/80"/></button>
        </div>
        <div className="p-5 space-y-4">
          {result.drawn ? (
            <>
              <div className="flex gap-2 items-start text-blue-700 font-semibold">
                <Check className="w-5 h-5 flex-shrink-0 mt-0.5"/>
                <span>Auslosung abgeschlossen – Gegner steht fest!</span>
              </div>
              <div className="flex items-center gap-4 bg-blue-50 rounded-2xl p-4">
                <div className="flex flex-col items-center gap-1.5">
                  <img src="https://upload.wikimedia.org/wikipedia/commons/d/da/FC_Bayern_M%C3%BCnchen_-_Logo_-_2002_%E2%80%93_2017.svg" className="w-12 h-12 object-contain" alt="Bayern" onError={e=>{e.target.style.display='none'}}/>
                  <span className="text-xs font-bold text-gray-700">FC Bayern</span>
                </div>
                <div className="flex-1 text-center">
                  <div className="text-lg font-black text-blue-700">VS</div>
                  <div className="text-xs text-gray-400 mt-0.5">Achtelfinale</div>
                </div>
                <div className="flex flex-col items-center gap-1.5">
                  {BADGES['Atalanta Bergamo'] && <img src={BADGES['Atalanta Bergamo']} className="w-12 h-12 object-contain" alt="Atalanta"/>}
                  <span className="text-xs font-bold text-gray-700">Atalanta</span>
                </div>
              </div>
              <div className="space-y-2 text-sm">
                <div className="flex items-start gap-2 bg-gray-50 rounded-xl p-3">
                  <span className="text-base">✈️</span>
                  <div><div className="font-semibold text-gray-700">Hinspiel (Auswärts)</div><div className="text-gray-500">{result.hinspiel}</div></div>
                </div>
                <div className="flex items-start gap-2 bg-red-50 rounded-xl p-3">
                  <span className="text-base">🏟️</span>
                  <div><div className="font-semibold text-red-700">Rückspiel (Heimspiel)</div><div className="text-red-500">{result.rueckspiel}</div></div>
                </div>
              </div>
              <div className="flex gap-1.5 text-xs text-gray-400 bg-gray-50 rounded-xl p-3">
                <Info className="w-3.5 h-3.5 flex-shrink-0 mt-0.5"/>
                Das Heimspiel (Rückspiel) ist bereits in der Liste eingetragen. Bayern hat als Platz-2-Team der Ligaphase immer Heimrecht im Rückspiel.
              </div>
            </>
          ) : (
            <div className="flex gap-2 items-start text-blue-700">
              <Check className="w-5 h-5 flex-shrink-0 mt-0.5"/>
              <span className="font-semibold">Alle bekannten Heimspiele sind bereits eingetragen.</span>
            </div>
          )}
        </div>
        <div className="px-5 pb-5">
          <button onClick={onClose} className="w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl transition-colors text-sm">Schließen</button>
        </div>
      </div>
    </div>
  );
};

// ── Match Card ─────────────────────────────────────────────────────────────
const MatchCard = ({ match, onEdit }) => {
  const badge = BADGES[match.opponent];
  const isCL = match.comp === 'Champions League';

  return (
    <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
      <div className="p-4">
        {/* Top: badge, name, date, tag */}
        <div className="flex items-start gap-3 mb-3">
          <div className="w-10 h-10 flex-shrink-0 flex items-center justify-center">
            {badge
              ? <img src={badge} alt="" className="w-9 h-9 object-contain" onError={e=>{e.target.style.display='none'}}/>
              : <div className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-sm font-bold text-gray-400">{match.opponent[0]}</div>
            }
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-start justify-between gap-2">
              <span className="font-bold text-gray-900 leading-tight">{match.opponent}</span>
              <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${isCL ? 'bg-blue-600 text-white' : 'bg-red-500 text-white'}`}>
                {isCL ? 'CL' : `ST ${match.st}`}
              </span>
            </div>
            {match.date && (
              <div className="flex items-center gap-1 text-xs text-gray-400 mt-0.5">
                <Cal className="w-3 h-3"/>
                <span>{match.date}{match.time ? ` · ${match.time} Uhr` : ''}</span>
              </div>
            )}
            {match.result && (() => {
              const [h,a] = match.result.split(':').map(Number);
              const col = h>a ? 'text-green-600 bg-green-50' : h===a ? 'text-amber-600 bg-amber-50' : 'text-red-600 bg-red-50';
              return <span className={`inline-block text-xs font-bold mt-0.5 px-1.5 py-0.5 rounded ${col}`}>{match.result}</span>;
            })()}
            {isCL && match.clPhase && <div className="text-xs text-blue-500 font-medium mt-0.5">{match.clPhase}</div>}
          </div>
        </div>

        {/* Bottom: user + pills + edit */}
        <div className="flex items-center gap-2 pt-2.5 border-t border-gray-50">
          <div className="w-6 h-6 rounded-full bg-gradient-to-br from-red-400 to-red-700 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
            {(match.user||'?')[0].toUpperCase()}
          </div>
          <span className="text-sm font-medium text-gray-700 flex-1 truncate min-w-0">{match.user||'–'}</span>
          <div className="flex items-center gap-1 flex-shrink-0">
            {/* Versendet pill */}
            <span className={`flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-xs font-medium ${match.versendet==='Ja' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
              {match.versendet==='Ja' ? <Check className="w-3 h-3"/> : <Xc className="w-3 h-3"/>} V
            </span>
            {/* Bezahlt pill */}
            <span className={`flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-xs font-medium ${match.bezahlt==='Ja' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
              {match.bezahlt==='Ja' ? <Check className="w-3 h-3"/> : <Xc className="w-3 h-3"/>} B
            </span>
            {/* Papa pill */}
            <span className={`flex items-center gap-0.5 px-1.5 py-0.5 rounded-full text-xs font-medium ${match.papa==='Ja' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
              {match.papa==='Ja' ? <Check className="w-3 h-3"/> : <Xc className="w-3 h-3"/>} P
            </span>
            {onEdit && (
              <button onClick={() => onEdit(match)} className="p-1.5 rounded-lg text-gray-300 hover:text-red-500 hover:bg-red-50 transition-colors ml-0.5">
                <Edit className="w-3.5 h-3.5"/>
              </button>
            )}
          </div>
        </div>

        {match.notizen && (
          <div className="mt-2 text-xs text-gray-400 bg-gray-50 rounded-lg px-2.5 py-1.5 italic">
            💬 {match.notizen}
          </div>
        )}
      </div>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const [season, setSeason]           = useState('25_26');
  const [matches2526, setMatches2526] = useState(INIT_2526);
  const [filter, setFilter]           = useState('all'); // 'all'|'bl'|'cl'|'offen'
  const [search, setSearch]           = useState('');
  const [editMatch, setEditMatch]     = useState(null);
  const [clResult, setClResult]       = useState(null);
  const [clLoading, setClLoading]     = useState(false);

  const data   = season === '25_26' ? matches2526 : INIT_2425;
  const canEdit = season === '25_26';

  const stats = useMemo(() => ({
    bl:    data.filter(m => m.comp !== 'Champions League').length,
    cl:    data.filter(m => m.comp === 'Champions League').length,
    offen: data.filter(m => m.bezahlt !== 'Ja').length,
  }), [data]);

  const filtered = useMemo(() => data.filter(m => {
    const s = search.toLowerCase();
    if (s && !m.opponent.toLowerCase().includes(s) && !(m.user||'').toLowerCase().includes(s)) return false;
    if (filter === 'bl')    return m.comp !== 'Champions League';
    if (filter === 'cl')    return m.comp === 'Champions League';
    if (filter === 'offen') return m.bezahlt !== 'Ja';
    return true;
  }), [data, filter, search]);

  const saveEdit = updated => {
    setMatches2526(prev => prev.map(m => m.id === updated.id ? updated : m));
    setEditMatch(null);
  };

  const toggleFilter = f => setFilter(p => p === f ? 'all' : f);

  const handleCLReload = () => {
    setClLoading(true);
    setTimeout(() => {
      setClLoading(false);
      // Auslosung hat stattgefunden (27.02.2026): Bayern spielt gegen Atalanta Bergamo
      const hasAchtel = matches2526.some(m => m.comp === 'Champions League' && (m.clPhase||'').includes('Achtelfinale'));
      setClResult({ type: 'uptodate', drawn: true, opponent: 'Atalanta Bergamo',
        hinspiel: 'Di., 10.03.2026 · 21:00 Uhr in Bergamo',
        rueckspiel: 'Mi., 18.03.2026 · 21:00 Uhr · Allianz Arena' });
    }, 800);
  };

  // ── Stat button component (inline) ──
  const StatBtn = ({ label, value, f, color, ring }) => {
    const active = filter === f;
    return (
      <button onClick={() => toggleFilter(f)}
        className={`rounded-xl p-3 text-left transition-all flex-1 ${color} ${active ? `ring-2 ${ring} scale-[1.04]` : 'opacity-80 hover:opacity-100'}`}>
        <div className="text-2xl font-bold text-white">{value}</div>
        <div className="text-xs text-white/80 leading-tight mt-0.5">{label}</div>
      </button>
    );
  };

  return (
    <div className="min-h-screen bg-gray-50">
      <div className="max-w-xl mx-auto px-3 pt-4 pb-24">

        {/* ── HEADER ── */}
        <div className="bg-gradient-to-br from-red-600 to-red-800 rounded-2xl p-5 mb-4 shadow-xl">
          <div className="flex items-center gap-3 mb-4">
            <Trophy className="w-9 h-9 text-white flex-shrink-0"/>
            <div>
              <h1 className="text-xl font-bold text-white">FC Bayern München</h1>
              <p className="text-red-200 text-xs">Ticketverteilung</p>
            </div>
          </div>

          {/* Season tabs */}
          <div className="flex gap-2 mb-4">
            {[['25_26','Saison 25/26'],['24_25','Saison 24/25']].map(([k,l]) => (
              <button key={k} onClick={()=>{setSeason(k);setFilter('all');setSearch('');}}
                className={`px-3.5 py-1.5 rounded-lg text-sm font-semibold transition-all ${season===k ? 'bg-white text-red-700 shadow-sm' : 'bg-white/20 text-white hover:bg-white/30'}`}>
                {l}
              </button>
            ))}
          </div>

          {/* Stat filter buttons */}
          <div className="flex gap-2 mb-3">
            <StatBtn label="Bundesliga"    value={stats.bl}    f="bl"    color="bg-red-500"   ring="ring-white/60"/>
            <StatBtn label="Champ. League" value={stats.cl}    f="cl"    color="bg-blue-600"  ring="ring-white/60"/>
            <StatBtn label="Zahlung offen" value={stats.offen} f="offen" color="bg-amber-500" ring="ring-white/60"/>
          </div>

          {/* CL reload */}
          {season === '25_26' && (
            <button onClick={handleCLReload} disabled={clLoading}
              className="w-full flex items-center justify-center gap-2 bg-white/15 hover:bg-white/25 disabled:opacity-50 border border-white/25 text-white font-semibold py-2.5 rounded-xl transition-all text-sm">
              <Refresh className={`w-4 h-4 flex-shrink-0 ${clLoading ? 'spin' : ''}`}/>
              {clLoading ? 'Wird geladen…' : 'CL-Begegnungen neu laden'}
            </button>
          )}
        </div>

        {/* ── SEARCH ── */}
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 flex items-center gap-2 px-3 py-2.5 mb-3">
          <Search className="w-4 h-4 text-gray-400 flex-shrink-0"/>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Gegner oder Person suchen…"
            className="flex-1 text-sm focus:outline-none bg-transparent placeholder-gray-400"/>
          {search && <button onClick={()=>setSearch('')} className="text-gray-300 hover:text-gray-500"><Close className="w-4 h-4"/></button>}
        </div>

        {/* Active filter hint */}
        {(filter !== 'all' || search) && (
          <div className="flex items-center justify-between mb-3 px-1">
            <span className="text-xs text-gray-400">{filtered.length} Spiel{filtered.length!==1?'e':''} angezeigt</span>
            <button onClick={()=>{setFilter('all');setSearch('');}} className="text-xs text-red-600 font-semibold hover:underline">
              Alle anzeigen
            </button>
          </div>
        )}

        {/* ── LIST ── */}
        <div className="grid gap-2.5">
          {filtered.length === 0 ? (
            <div className="text-center py-16">
              <Search className="w-10 h-10 mx-auto mb-2 text-gray-200"/>
              <p className="text-gray-400 text-sm">Keine Spiele gefunden</p>
            </div>
          ) : filtered.map(m => (
            <MatchCard key={m.id} match={m} onEdit={canEdit ? setEditMatch : null}/>
          ))}
        </div>

        {/* ── INTERESSENTEN 2026/27 ── */}
        {season === '25_26' && filter === 'all' && !search && (
          <div className="mt-6">
            <div className="flex items-center gap-2 mb-3">
              <div className="h-px flex-1 bg-gray-100"/>
              <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">Interessenten 2026/27</span>
              <div className="h-px flex-1 bg-gray-100"/>
            </div>
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
              {INTERESSENTEN_2627.map((name, i) => (
                <div key={i} className={`flex items-center gap-3 px-4 py-3 ${i < INTERESSENTEN_2627.length-1 ? 'border-b border-gray-50' : ''}`}>
                  <div className="w-2 h-2 rounded-full bg-red-400 flex-shrink-0"/>
                  <span className="text-sm text-gray-800">{name}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {editMatch && <EditModal match={editMatch} onSave={saveEdit} onClose={()=>setEditMatch(null)}/>}
      {clResult  && <CLModal   result={clResult}                   onClose={()=>setClResult(null)}/>}
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
